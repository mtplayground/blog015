services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: production
      DATABASE_URL: "file:/data/dev.db"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
      SESSION_SECRET: "${SESSION_SECRET}"
      BASE_URL: "${BASE_URL:-http://localhost:8080}"
    volumes:
      - blog015_sqlite_data:/data
    restart: unless-stopped

volumes:
  blog015_sqlite_data:
